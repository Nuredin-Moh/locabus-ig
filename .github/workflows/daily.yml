name: Locabus Instagram quotidien

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 10:00 heure suisse, chaque jour
  workflow_dispatch:       # permet un déclenchement manuel

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Publier le post du jour sur Instagram
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python publish_ig.py
